<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Coding Dictionary</title>

    <style>
        /* ---------- SAME STYLE ---------- */
        html, body {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: rgb(11, 14, 26);
            color: rgb(240, 244, 255);
            min-height: 100vh;
            padding: 1.5rem 1rem 0;
            overflow-x: hidden;
        }

        [id="starfield"] {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            display: block;
        }

        .main-wrapper {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ---------- HEADER ---------- */
        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, rgb(167, 139, 250), rgb(96, 165, 250), rgb(52, 211, 153));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: rgb(148, 163, 184);
            font-size: 1.2rem;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: rgb(167, 139, 250);
            text-decoration: none;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 1rem;
            transition: 0.3s;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.06);
            color: rgb(196, 181, 253);
        }

        /* ---------- CATEGORY TABS ---------- */
        .category-tabs {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2.5rem;
        }

        .category-tab {
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: rgb(148, 163, 184);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .category-tab:hover {
            background: rgba(255, 255, 255, 0.06);
            color: rgb(240, 244, 255);
        }

        .category-tab.active {
            background: rgba(167, 139, 250, 0.15);
            border-color: rgb(167, 139, 250);
            color: rgb(167, 139, 250);
        }

        /* ---------- CONCEPT GRID ---------- */
        .concept-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 1.2rem;
            margin-bottom: 3rem;
        }

        .concept-btn {
            padding: 1.2rem 1rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.02);
            color: rgb(203, 213, 225);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }

        .concept-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-3px);
            border-color: rgba(167, 139, 250, 0.3);
        }

        .concept-btn .icon {
            font-size: 1.5rem;
        }

        .concept-btn .tag {
            font-size: 0.65rem;
            color: rgb(100, 116, 139);
            font-weight: 400;
            background: rgba(255, 255, 255, 0.04);
            padding: 0.1rem 0.6rem;
            border-radius: 20px;
        }

        /* ---------- POPUP / DEMO CARD ---------- */
        .demo-card {
            display: none;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            padding: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 3rem;
            animation: fadeIn 0.4s ease;
        }

        .demo-card.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .demo-card .demo-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .demo-card .demo-header h2 {
            font-size: 2rem;
            font-weight: 700;
            color: rgb(238, 242, 255);
            margin: 0;
        }

        .demo-card .demo-header .close-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: rgb(148, 163, 184);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .demo-card .demo-header .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: rgb(240, 244, 255);
        }

        .demo-card .explanation {
            color: rgb(203, 213, 225);
            font-size: 1.05rem;
            line-height: 1.8;
            margin-bottom: 1.5rem;
        }

        .demo-card .explanation strong {
            color: rgb(196, 181, 253);
        }

        .demo-card .analogy {
            background: rgba(167, 139, 250, 0.06);
            border-left: 4px solid rgb(167, 139, 250);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-style: italic;
            color: rgb(203, 213, 225);
        }

        .demo-card .code-block {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 1.5rem;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: rgb(203, 213, 225);
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin: 1.5rem 0;
        }

        .demo-card .code-block .comment {
            color: rgb(100, 116, 139);
        }

        .demo-card .code-block .keyword {
            color: rgb(167, 139, 250);
        }

        .demo-card .code-block .string {
            color: rgb(74, 222, 128);
        }

        .demo-card .code-block .number {
            color: rgb(251, 191, 36);
        }

        .demo-card .code-block .property {
            color: rgb(96, 165, 250);
        }

        /* ---------- DEMO BOX (live example) ---------- */
        .demo-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 2rem;
            margin: 1.5rem 0;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .demo-box .example-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.5rem;
            margin: 0.5rem 0;
            transition: all 0.5s ease;
        }

        .demo-box .example-container .target {
            background: rgba(167, 139, 250, 0.2);
            border: 2px solid rgb(167, 139, 250);
            border-radius: 8px;
            padding: 0.8rem;
            color: rgb(240, 244, 255);
            transition: all 0.5s ease;
        }

        /* Control sliders */
        .controls {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            margin: 1rem 0;
        }

        .controls label {
            color: rgb(148, 163, 184);
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
        }

        .controls input[type="range"] {
            width: 150px;
            accent-color: rgb(167, 139, 250);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            height: 4px;
            cursor: pointer;
        }

        .controls input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgb(167, 139, 250);
            cursor: pointer;
        }

        .controls .value-display {
            color: rgb(196, 181, 253);
            font-weight: 600;
            min-width: 40px;
            text-align: center;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 1024px) {
            .concept-grid {
                grid-template-columns: 1fr 1fr 1fr;
            }
        }

        @media (max-width: 768px) {
            .concept-grid {
                grid-template-columns: 1fr 1fr;
            }

            .demo-card {
                padding: 1.5rem;
            }

            .demo-card .demo-header h2 {
                font-size: 1.5rem;
            }

            .controls {
                flex-direction: column;
                align-items: center;
            }

            .controls label {
                flex-direction: row;
                width: 100%;
                justify-content: space-between;
                max-width: 300px;
            }
        }

        @media (max-width: 480px) {
            .concept-grid {
                grid-template-columns: 1fr;
            }

            .category-tabs {
                flex-direction: column;
                align-items: center;
            }

            .category-tab {
                width: 100%;
                text-align: center;
                max-width: 300px;
            }
        }
    </style>
</head>

<body>

    <!-- JAVASCRIPT -->
    <script>
        // ---------- STARFIELD ----------
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');

        let width, height;
        let stars = [];

        const STAR_COUNT = 200;

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            createStars();
        }

        function createStars() {
            stars = [];
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 1.5 + 0.3,
                    speed: Math.random() * 0.8 + 0.2,
                    opacity: Math.random() * 0.7 + 0.3,
                    direction: Math.random() > 0.5 ? 1 : -1
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, width, height);

            for (let star of stars) {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, ' + star.opacity + ')';
                ctx.fill();

                star.x += star.speed * star.direction;

                if (star.x > width) {
                    star.x = 0;
                    star.y = Math.random() * height;
                } else if (star.x < 0) {
                    star.x = width;
                    star.y = Math.random() * height;
                }
            }

            requestAnimationFrame(drawStars);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        drawStars();

        // ---------- CONCEPT DATA ----------
        const concepts = {
            margin: {
                name: 'Margin',
                category: 'css',
                icon: '📦',
                explanation: 'Margin creates space <strong>OUTSIDE</strong> an element\'s border. It pushes other elements away.',
                analogy: 'Like the empty space between your house and your neighbour\'s house. It\'s the distance you keep from others.',
                code: `/* Space outside the box */\n<span class="property">margin</span>: <span class="number">20</span><span class="number">px</span>;\n\n/* Specific sides */\n<span class="property">margin-top</span>: <span class="number">10</span><span class="number">px</span>;\n<span class="property">margin-right</span>: <span class="number">20</span><span class="number">px</span>;\n<span class="property">margin-bottom</span>: <span class="number">30</span><span class="number">px</span>;\n<span class="property">margin-left</span>: <span class="number">40</span><span class="number">px</span>;`,
                demoHTML: `<div class="example-container">
                    <div class="target" id="marginTarget" style="margin:20px; background:rgba(167,139,250,0.3);">
                        This box has 20px margin
                    </div>
                </div>
                <div class="controls">
                    <label>
                        Margin: <span class="value-display" id="marginValue">20</span>px
                        <input type="range" min="0" max="80" value="20" id="marginSlider" oninput="updateMargin(this.value)">
                    </label>
                </div>`,
                demoJS: function() {
                    window.updateMargin = function(value) {
                        document.getElementById('marginTarget').style.margin = value + 'px';
                        document.getElementById('marginValue').textContent = value;
                    };
                }
            },

            padding: {
                name: 'Padding',
                category: 'css',
                icon: '📦',
                explanation: 'Padding creates space <strong>INSIDE</strong> an element\'s border, between the border and the content. It pushes content inward.',
                analogy: 'Like the space between your wall and your furniture. It\'s the breathing room inside your room.',
                code: `/* Space inside the box */\n<span class="property">padding</span>: <span class="number">20</span><span class="number">px</span>;\n\n/* Specific sides */\n<span class="property">padding-top</span>: <span class="number">10</span><span class="number">px</span>;\n<span class="property">padding-right</span>: <span class="number">20</span><span class="number">px</span>;\n<span class="property">padding-bottom</span>: <span class="number">30</span><span class="number">px</span>;\n<span class="property">padding-left</span>: <span class="number">40</span><span class="number">px</span>;`,
                demoHTML: `<div class="example-container">
                    <div class="target" id="paddingTarget" style="padding:20px; background:rgba(167,139,250,0.3);">
                        This box has 20px padding
                    </div>
                </div>
                <div class="controls">
                    <label>
                        Padding: <span class="value-display" id="paddingValue">20</span>px
                        <input type="range" min="0" max="80" value="20" id="paddingSlider" oninput="updatePadding(this.value)">
                    </label>
                </div>`,
                demoJS: function() {
                    window.updatePadding = function(value) {
                        document.getElementById('paddingTarget').style.padding = value + 'px';
                        document.getElementById('paddingValue').textContent = value;
                    };
                }
            },

            flexbox: {
                name: 'Flexbox',
                category: 'css',
                icon: '🧭',
                explanation: 'Flexbox is a layout system that arranges items in a <strong>row or column</strong>, distributing space between them. Perfect for making things center or spread out.',
                analogy: 'Like putting items on a shelf – you can align them left, right, center, or spread them evenly with equal gaps.',
                code: `/* Enable flexbox */\n<span class="property">display</span>: <span class="keyword">flex</span>;\n\n/* Horizontal alignment */\n<span class="property">justify-content</span>: <span class="keyword">center</span>;\n\n/* Vertical alignment */\n<span class="property">align-items</span>: <span class="keyword">center</span>;\n\n/* Gap between items */\n<span class="property">gap</span>: <span class="number">20</span><span class="number">px</span>;\n\n/* Direction */\n<span class="property">flex-direction</span>: <span class="keyword">row</span>; /* row, column, row-reverse */`,
                demoHTML: `<div class="example-container" style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center; background:rgba(167,139,250,0.1); padding:1rem;">
                    <div style="background:rgba(167,139,250,0.3); padding:1rem 1.5rem; border-radius:8px;">Item 1</div>
                    <div style="background:rgba(96,165,250,0.3); padding:1rem 1.5rem; border-radius:8px;">Item 2</div>
                    <div style="background:rgba(52,211,153,0.3); padding:1rem 1.5rem; border-radius:8px;">Item 3</div>
                </div>
                <div class="controls">
                    <label>
                        Justify:
                        <select id="flexJustify" onchange="updateFlex()">
                            <option value="flex-start">Start</option>
                            <option value="center" selected>Center</option>
                            <option value="flex-end">End</option>
                            <option value="space-between">Space Between</option>
                            <option value="space-around">Space Around</option>
                        </select>
                    </label>
                </div>`,
                demoJS: function() {
                    window.updateFlex = function() {
                        const containers = document.querySelectorAll('.example-container');
                        containers.forEach(c => {
                            c.style.justifyContent = document.getElementById('flexJustify').value;
                        });
                    };
                }
            },

            grid: {
                name: 'Grid',
                category: 'css',
                icon: '📐',
                explanation: 'Grid is a layout system that creates <strong>rows and columns</strong> like a spreadsheet. Perfect for complex layouts with alignment.',
                analogy: 'Like a chessboard or a spreadsheet – you can place items in exact cells and control their size.',
                code: `/* Enable grid */\n<span class="property">display</span>: <span class="keyword">grid</span>;\n\n/* Define columns */\n<span class="property">grid-template-columns</span>: <span class="number">1</span><span class="number">fr</span> <span class="number">1</span><span class="number">fr</span> <span class="number">1</span><span class="number">fr</span>;\n\n/* Define rows */\n<span class="property">grid-template-rows</span>: <span class="number">auto</span> <span class="number">auto</span>;\n\n/* Gap between items */\n<span class="property">gap</span>: <span class="number">20</span><span class="number">px</span>;`,
                demoHTML: `<div class="example-container" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; background:rgba(167,139,250,0.1); padding:1rem;">
                    <div style="background:rgba(167,139,250,0.3); padding:1rem; border-radius:8px; text-align:center;">1</div>
                    <div style="background:rgba(96,165,250,0.3); padding:1rem; border-radius:8px; text-align:center;">2</div>
                    <div style="background:rgba(52,211,153,0.3); padding:1rem; border-radius:8px; text-align:center;">3</div>
                    <div style="background:rgba(251,191,36,0.3); padding:1rem; border-radius:8px; text-align:center;">4</div>
                    <div style="background:rgba(248,113,113,0.3); padding:1rem; border-radius:8px; text-align:center;">5</div>
                    <div style="background:rgba(167,139,250,0.3); padding:1rem; border-radius:8px; text-align:center;">6</div>
                </div>
                <div class="controls">
                    <label>

            array: {
                name: 'Array',
                category: 'js',
                icon: '📋',
                explanation: 'An array is a <strong>list of items</strong> stored in a single variable. You can access each item by its index (position).',
                analogy: 'Like a shopping list – you have multiple items in one list, and you can pick the first, second, or last item.',
                code: `<span class="comment">// Create an array</span>\n<span class="keyword">let</span> fruits = [<span class="string">'apple'</span>, <span class="string">'banana'</span>, <span class="string">'orange'</span>];\n\n<span class="comment">// Access items (index starts at 0)</span>\n<span class="function">console</span>.<span class="function">log</span>(fruits[<span class="number">0</span>]); <span class="comment">// 'apple'</span>\n<span class="function">console</span>.<span class="function">log</span>(fruits[<span class="number">1</span>]); <span class="comment">// 'banana'</span>\n\n<span class="comment">// Add items</span>\nfruits.<span class="function">push</span>(<span class="string">'grape'</span>); <span class="comment">// Add to end</span>\nfruits.<span class="function">pop</span>(); <span class="comment">// Remove last item</span>\n\n<span class="comment">// Loop through all items</span>\n<span class="keyword">for</span> (<span class="keyword">let</span> fruit <span class="keyword">of</span> fruits) {\n  <span class="function">console</span>.<span class="function">log</span>(fruit);\n}`,
                demoHTML: `<div style="background:rgba(167,139,250,0.1); padding:1.5rem; border-radius:12px;">
                    <div style="background:rgba(0,0,0,0.3); padding:1rem; border-radius:8px; display:flex; gap:1rem; flex-wrap:wrap; justify-content:center; margin-bottom:1rem;" id="arrayDisplay">
                        <div style="background:rgba(167,139,250,0.3); padding:0.5rem 1rem; border-radius:8px;">🍎 Apple</div>
                        <div style="background:rgba(96,165,250,0.3); padding:0.5rem 1rem; border-radius:8px;">🍌 Banana</div>
                        <div style="background:rgba(52,211,153,0.3); padding:0.5rem 1rem; border-radius:8px;">🍊 Orange</div>
                    </div>
                    <div style="display:flex; gap:0.5rem; flex-wrap:wrap; justify-content:center;">
                        <button onclick="addFruit()" style="background:rgba(52,211,153,0.2); border:1px solid rgb(52,211,153); color:rgb(240,244,255); padding:0.4rem 1.2rem; border-radius:40px; cursor:pointer;">➕ Add Fruit</button>
                        <button onclick="removeFruit()" style="background:rgba(248,113,113,0.2); border:1px solid rgb(248,113,113); color:rgb(240,244,255); padding:0.4rem 1.2rem; border-radius:40px; cursor:pointer;">➖ Remove Last</button>
                        <button onclick="showFruits()" style="background:rgba(167,139,250,0.2); border:1px solid rgb(167,139,250); color:rgb(240,244,255); padding:0.4rem 1.2rem; border-radius:40px; cursor:pointer;">📋 Show All</button>
                    </div>
                    <p id="arrayMessage" style="text-align:center; color:rgb(196,181,253); margin-top:0.5rem; min-height:20px;"></p>
                </div>`,
                demoJS: function() {
                    let fruits = ['🍎 Apple', '🍌 Banana', '🍊 Orange'];
                    const emojis = ['🍇 Grape', '🍓 Strawberry', '🍉 Watermelon', '🥝 Kiwi', '🍑 Peach', '🍒 Cherry', '🍋 Lemon', '🍐 Pear'];

                    function updateArrayDisplay() {
                        const container = document.getElementById('arrayDisplay');
                        container.innerHTML = '';
                        fruits.forEach((fruit, index) => {
                            const div = document.createElement('div');
                            div.style.background = ['rgba(167,139,250,0.3)', 'rgba(96,165,250,0.3)', 'rgba(52,211,153,0.3)', 'rgba(251,191,36,0.3)', 'rgba(248,113,113,0.3)'][index % 5];
                            div.style.padding = '0.5rem 1rem';
                            div.style.borderRadius = '8px';
                            div.style.border = '1px solid rgba(255,255,255,0.05)';
                            div.textContent = fruit;
                            container.appendChild(div);
                        });
                    }

                    window.addFruit = function() {
                        const fruit = emojis[Math.floor(Math.random() * emojis.length)];
                        fruits.push(fruit);
                        updateArrayDisplay();
                        document.getElementById('arrayMessage').textContent = `➕ Added "${fruit}" to the array! (Total: ${fruits.length})`;
                    };

                    window.removeFruit = function() {
                        if (fruits.length > 0) {
                            const removed = fruits.pop();
                            updateArrayDisplay();
                            document.getElementById('arrayMessage').textContent = `➖ Removed "${removed}" from the array. (Total: ${fruits.length})`;
                        } else {
                            document.getElementById('arrayMessage').textContent = '❌ Array is empty! Add some fruits first.';
                        }
                    };

                    window.showFruits = function() {
                        let list = '📋 Your Fruit Array:\n\n';
                        fruits.forEach((fruit, index) => {
                            list += `  ${index + 1}. ${fruit}\n`;
                        });
                        list += `\nTotal: ${fruits.length} items`;
                        alert(list);
                    };
                }
            },

                name: 'Object',
                category: 'js',
                icon: '🧩',
                explanation: 'An object is a <strong>collection of properties</strong> (key-value pairs). It groups related data together like a real-world entity.',
                analogy: 'Like a person – they have a name, age, and job. Each piece of information is a property of that person.',
                code: `<span class="comment">// Create an object</span>\n<span class="keyword">let</span> person = {\n  <span class="property">name</span>: <span class="string">"Alice"</span>,\n  <span class="property">age</span>: <span class="number">25</span>,\n  <span class="property">isStudent</span>: <span class="keyword">true</span>,\n  <span class="property">greet</span>: <span class="keyword">function</span>() {\n    <span class="keyword">return</span> <span class="string">"Hello, I'm "</span> + <span class="keyword">this</span>.name;\n  }\n};\n\n<span class="comment">// Access properties</span>\n<span class="function">console</span>.<span class="function">log</span>(person.name); <span class="comment">// "Alice"</span>\n<span class="function">console</span>.<span class="function">log</span>(person.age);  <span class="comment">// 25</span>\n\n<span class="comment">// Call a method</span>\nperson.<span class="function">greet</span>(); <span class="comment">// "Hello, I'm Alice"</span>`,

                        <button onclick="showObject()" style="background:rgba(167,139,250,0.2); border:1px solid rgb(167,139,250); color:rgb(240,244,255); padding:0.5rem 1.8rem; border-radius:40px; cursor:pointer;">📋 Show Object</button>

                demoJS: function() {

                demoHTML: `<div style="background:rgba(167,139,250,0.1); padding:1.5rem; border-radius:12px; text-align:center;">
                    <div style="display:flex; gap:1rem; flex-wrap:wrap; justify-content:center;">
                        <button onclick="alert('💬 Hello, Mate!')" style="background:linear-gradient(135deg, rgb(124,58,237), rgb(79,70,229)); border:none; color:white; padding:0.8rem 2rem; border-radius:40px; font-weight:600; cursor:pointer;">💬 Simple Alert</button>
                        <button onclick="alert('👋 Welcome to the Coding Dictionary!\n\nThis is a multi-line alert.\n\nClick OK to continue.')" style="background:rgba(96,165,250,0.3); border:1px solid rgb(96,165,250); color:rgb(240,244,255); padding:0.8rem 2rem; border-radius:40px; cursor:pointer;">📝 Multi-Line Alert</button>
                        <button onclick="dynamicAlert()" style="background:rgba(52,211,153,0.3); border:1px solid rgb(52,211,153); color:rgb(240,244,255); padding:0.8rem 2rem; border-radius:40px; cursor:pointer;">🎯 Dynamic Alert</button>
                    </div>
                    <p style="color:rgb(148,163,184); margin-top:0.8rem; font-size:0.85rem;">Click a button to see the alert in action!</p>
                </div>`,
                demoJS: function() {
                    window.dynamicAlert = function() {
                        const messages = [
                            '🎯 You clicked a button!',
                            '✨ This alert was generated by JavaScript!',
                            '💡 You\'re learning how alerts work!',
                            '🚀 Keep clicking to see more alerts!',
                            '🎉 You\'re doing great, mate!'
                        ];
                        const message = messages[Math.floor(Math.random() * messages.length)];
                        alert(`💬 Dynamic Alert\n\n${message}\n\nClick OK to dismiss.`);
                    };
                }
            }
        };

        // ---------- DEMO CARD FUNCTIONS ----------
        function openDemo(conceptKey) {
            const concept = concepts[conceptKey];
            if (!concept) return;

            const demoCard = document.getElementById('demoCard');
            const demoTitle = document.getElementById('demoTitle');
            const demoContent = document.getElementById('demoContent');

            // Set title
            demoTitle.textContent = `${concept.icon || '📚'} ${concept.name}`;

            // Build content
            let html = `
                <div class="explanation">${concept.explanation}</div>
                <div class="analogy">💡 ${concept.analogy}</div>
                <div class="code-block">${concept.code}</div>
            `;

            if (concept.demoHTML) {
                html += `<div class="demo-box">${concept.demoHTML}</div>`;
            }

            demoContent.innerHTML = html;

            // Run demo JS if it exists
            if (concept.demoJS) {
                concept.demoJS();
                // Call any init functions
                if (window.updateMargin) { /* just to ensure functions are registered */ }
            }

            // Show the card
            demoCard.classList.add('active');

            // Scroll to it smoothly
            demoCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function closeDemo() {
            document.getElementById('demoCard').classList.remove('active');
        }

        // ---------- CONCEPT BUTTON CLICKS ----------
        document.querySelectorAll('.concept-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const conceptKey = this.dataset.concept;
                openDemo(conceptKey);
            });
        });

        // ---------- CATEGORY FILTER ----------
        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                // Update active tab
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');

                const category = this.dataset.category;

                // Show/hide concept buttons
                document.querySelectorAll('.concept-btn').forEach(btn => {
                    if (category === 'all' || btn.dataset.category === category) {
                        btn.style.display = 'flex';
                    } else {
                        btn.style.display = 'none';
                    }
                });

                // Close demo when switching categories
                closeDemo();
            });
        });

        console.log('📚 Interactive Coding Dictionary is ready!');
    </script>

</body>
</html>
