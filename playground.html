<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Playground</title>

    <style>
        /* ---------- RESET & BASE ---------- */
        html, body {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: rgb(11, 14, 26);
            color: rgb(240, 244, 255);
            min-height: 100vh;
            padding: 1.5rem 1rem 0;
            overflow-x: hidden;
        }

        [id="starfield"] {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            display: block;
        }

        .main-wrapper {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: rgb(167, 139, 250);
            text-decoration: none;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 1.5rem;
            transition: 0.3s;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.06);
            color: rgb(196, 181, 253);
        }

        .page-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .page-header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, rgb(167, 139, 250), rgb(96, 165, 250), rgb(52, 211, 153));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: rgb(148, 163, 184);
            font-size: 1.2rem;
        }

        /* ---------- PLAYGROUND LAYOUT ---------- */
        .playground-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .editor-panel {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .editor-panel h3 {
            color: rgb(238, 242, 255);
            font-size: 1.1rem;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .editor-panel textarea {
            width: 100%;
            height: 350px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            color: rgb(203, 213, 225);
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            padding: 1rem;
            resize: vertical;
            line-height: 1.6;
            tab-size: 2;
        }

        .editor-panel textarea:focus {
            outline: none;
            border-color: rgb(167, 139, 250);
        }

        .editor-panel .run-btn {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.8rem 2.5rem;
            border-radius: 60px;
            background: linear-gradient(135deg, rgb(124, 58, 237), rgb(79, 70, 229));
            color: rgb(255, 255, 255);
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        .editor-panel .run-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(79, 70, 229, 0.4);
        }

        .preview-panel {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .preview-panel h3 {
            color: rgb(238, 242, 255);
            font-size: 1.1rem;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .preview-frame {
            background: rgb(255, 255, 255);
            border-radius: 12px;
            height: 400px;
            overflow: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .preview-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: rgb(255, 255, 255);
            border-radius: 12px;
        }

        /* ---------- QUICK EXAMPLES ---------- */
        .examples-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 3rem;
        }

        .examples-section h3 {
            color: rgb(238, 242, 255);
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .example-buttons {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .example-btn {
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: rgb(203, 213, 225);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .example-btn:hover {
            background: rgba(167, 139, 250, 0.15);
            border-color: rgb(167, 139, 250);
            color: rgb(240, 244, 255);
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 768px) {
            .playground-container {
                grid-template-columns: 1fr;
            }

            .editor-panel textarea {
                height: 250px;
            }

            .preview-frame {
                height: 300px;
            }

            .page-header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <canvas id="starfield"></canvas>

    <div class="main-wrapper">

        <a href="index.html" class="back-button">← Back to Explorer</a>

        <div class="page-header">
            <h1>💻 Code Playground</h1>
            <p>Write HTML, CSS, and JavaScript – see it run live!</p>
        </div>

        <!-- QUICK EXAMPLES -->
        <div class="examples-section">
            <h3>🎯 Quick Examples (Click to load)</h3>
            <div class="example-buttons">
                <button class="example-btn" onclick="loadExample('hello')">👋 Hello World</button>
                <button class="example-btn" onclick="loadExample('button')">🔘 Button Click</button>
                <button class="example-btn" onclick="loadExample('card')">📦 Card Layout</button>
                <button class="example-btn" onclick="loadExample('counter')">🔢 Counter</button>
                <button class="example-btn" onclick="loadExample('flex')">🧭 Flexbox Demo</button>
                <button class="example-btn" onclick="loadExample('grid')">📐 Grid Demo</button>
            </div>
        </div>

        <!-- PLAYGROUND -->
        <div class="playground-container">

            <!-- Editor Panel -->
            <div class="editor-panel">
                <h3>✏️ Editor</h3>
                <textarea id="codeEditor" spellcheck="false">&lt;h1&gt;Hello, World!&lt;/h1&gt;
&lt;p&gt;This is your code playground.&lt;/p&gt;
&lt;button onclick="alert('👋 Hello, Mate!')"&gt;Click Me&lt;/button&gt;</textarea>
                <button class="run-btn" onclick="runCode()">▶️ Run Code</button>
            </div>

            <!-- Preview Panel -->
            <div class="preview-panel">
                <h3>👁️ Preview</h3>
                <div class="preview-frame">
                    <iframe id="previewFrame" srcdoc="&lt;h1&gt;Hello, World!&lt;/h1&gt;&lt;p&gt;Click 'Run Code' to see your work.&lt;/p&gt;"></iframe>
                </div>
            </div>

        </div>

    </div>

    <script>
        // ---------- STARFIELD ----------
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');

        let width, height;
        let stars = [];

        const STAR_COUNT = 200;

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            createStars();
        }

        function createStars() {
            stars = [];
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 1.5 + 0.3,
                    speed: Math.random() * 0.8 + 0.2,
                    opacity: Math.random() * 0.7 + 0.3,
                    direction: Math.random() > 0.5 ? 1 : -1
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, width, height);

            for (let star of stars) {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, ' + star.opacity + ')';
                ctx.fill();

                star.x += star.speed * star.direction;

                if (star.x > width) {
                    star.x = 0;
                    star.y = Math.random() * height;
                } else if (star.x < 0) {
                    star.x = width;
                    star.y = Math.random() * height;
                }
            }

            requestAnimationFrame(drawStars);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        drawStars();

        // ---------- PLAYGROUND ----------
        function runCode() {
            const code = document.getElementById('codeEditor').value;
            const iframe = document.getElementById('previewFrame');

            let fullDoc = code;

            if (!code.includes('<html') && !code.includes('<body')) {
                fullDoc = `
<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
            background: rgb(255, 255, 255);
            color: rgb(20, 20, 30);
            line-height: 1.6;
        }
        button {
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, rgb(124, 58, 237), rgb(79, 70, 229));
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(79, 70, 229, 0.3);
        }
        input, textarea {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid rgb(200, 200, 210);
            font-size: 1rem;
            width: 100%;
            max-width: 300px;
        }
        .card {
            background: rgb(250, 250, 255);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid rgb(240, 240, 245);
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    ${code}
</body>
</html>`;
            }

            iframe.srcdoc = fullDoc;
        }

        // ---------- EXAMPLES ----------
        function loadExample(name) {
            const examples = {
                hello: `<h1 style="color: rgb(124, 58, 237
